name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # required for npm provenance attestation via OIDC

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      # viewer-main.js imports feezal-elements.js at Vite build time.
      # Generate it now so the Vite build can bundle all elements into viewer-bundle.js.
      - name: Generate www/editor/feezal-elements.js
        run: node scripts/generate-elements.js

      - name: Build www
        run: cd www && npm run build

      # Copy built frontend into server/dist/ (served as wwwDir after npm install -g feezal).
      # Element packages go to packages/ — npm strips node_modules/ from published tarballs.
      - name: Assemble server/dist/
        run: |
          cp -r www/dist/. server/dist/
          mkdir -p server/dist/packages
          cp -r www/node_modules/@feezal server/dist/packages/

      # Publish feezal server package (skip if this version is already on the registry).
      - name: Publish feezal server
        working-directory: server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view feezal@${VERSION} version 2>/dev/null || true)
          if [ "${PUBLISHED}" = "${VERSION}" ]; then
            echo "feezal@${VERSION} already published, skipping"
          else
            npm publish --access public --provenance
          fi

      # Publish each @feezal/* element/theme package (skip already-published versions).
      - name: Publish element and theme packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg_dir in www/node_modules/@feezal/*/; do
            pkg_json="${pkg_dir}package.json"
            [ -f "${pkg_json}" ] || continue
            NAME=$(node -p "require('./${pkg_json}').name")
            VERSION=$(node -p "require('./${pkg_json}').version")
            PUBLISHED=$(npm view "${NAME}@${VERSION}" version 2>/dev/null || true)
            if [ "${PUBLISHED}" = "${VERSION}" ]; then
              echo "${NAME}@${VERSION} already published, skipping"
            else
              echo "Publishing ${NAME}@${VERSION}"
              npm publish "${pkg_dir}" --access public --provenance
            fi
          done

