name: Publish Docker image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # create GitHub releases
  packages: write      # push to GHCR with GITHUB_TOKEN (OIDC-backed)
  id-token: write      # sigstore signing (SBOM attestation, optional cosign)
  attestations: write  # actions/attest-sbom

jobs:
  build-and-push:
    name: Build & push multi-platform image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for git log

      - name: Set up QEMU (multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # OIDC-backed; no extra secret needed

      - name: Extract version tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/feezal
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_REF=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # In-registry supply-chain attestations (inspect with
          # `docker buildx imagetools inspect`): BuildKit-generated SBOM
          # and full build provenance, attached to the image manifest.
          sbom: true
          provenance: mode=max

      # ----------------------------------------------------------------
      # SBOMs (A21 follow-up): attached to the GitHub release below.
      #   - image SBOMs (Syft): OS packages + npm modules as shipped in
      #     the container, per platform
      #   - npm source SBOMs (npm sbom, lockfile-only): exact production
      #     dependency tree of the server and www workspaces
      # Each in both standard formats: SPDX-JSON and CycloneDX-JSON.
      # ----------------------------------------------------------------

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate image SBOMs (SPDX + CycloneDX, per platform)
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/feezal
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          mkdir -p sbom
          for arch in amd64 arm64; do
            ${{ steps.syft.outputs.cmd }} "registry:${IMAGE}:${VERSION}" \
              --platform "linux/${arch}" \
              -o spdx-json="sbom/feezal-${VERSION}-docker-${arch}.spdx.json" \
              -o cyclonedx-json="sbom/feezal-${VERSION}-docker-${arch}.cdx.json"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate npm source SBOMs (SPDX + CycloneDX, per workspace)
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          for ws in server www; do
            (cd "$ws" && npm sbom --sbom-format spdx --omit dev --package-lock-only) \
              > "sbom/feezal-${VERSION}-npm-${ws}.spdx.json"
            (cd "$ws" && npm sbom --sbom-format cyclonedx --omit dev --package-lock-only) \
              > "sbom/feezal-${VERSION}-npm-${ws}.cdx.json"
          done

      # Signed attestation binding the image SBOM to the pushed image
      # digest; also pushed to GHCR. Verify with:
      #   gh attestation verify oci://ghcr.io/feezal/feezal:<version> -R feezal/feezal
      - name: Attest image SBOM
        uses: actions/attest-sbom@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/feezal
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom/feezal-${{ steps.meta.outputs.version }}-docker-amd64.spdx.json
          push-to-registry: true

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Build release body
        id: release_body
        run: |
          PREV="${{ steps.prev_tag.outputs.tag }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          if [ -n "$PREV" ]; then
            CHANGELOG="**Full Changelog**: https://github.com/${REPO}/compare/${PREV}...${TAG}"
            RANGE="${PREV}..HEAD"
          else
            CHANGELOG="**Full Changelog**: https://github.com/${REPO}/commits/${TAG}"
            RANGE="HEAD"
          fi

          COMMITS=$(git log "${RANGE}" --pretty=format:"- %s" --no-merges \
            | grep -Ev "^- chore[:(]" || true)

          {
            echo 'body<<EOF'
            echo "${CHANGELOG}"
            echo ""
            echo "## What's changed"
            echo ""
            echo "${COMMITS}"
            echo ""
            echo "## Update"
            echo ""
            echo "**Docker (manual):**"
            echo '```sh'
            echo "docker pull ghcr.io/feezal/feezal:latest"
            echo "docker rm -f feezal"
            echo "docker run -d --name feezal -p 3000:3000 -v feezal-data:/data ghcr.io/feezal/feezal:latest" 
            echo '```'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_body.outputs.body }}
          files: sbom/*
