<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>Feezal</title>
    <!--<link rel="manifest" href="manifest.json">-->

    <style>
        html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;

            font-family: 'Roboto', sans-serif;
            font-size: 14px;
        }
    </style>

    <link href="https://fonts.googleapis.com/css?family=Roboto|Material+Icons&display=block" rel="stylesheet">

    <script>

        window.feezal = {
            isEditor: true,
            siteName: location.search.replace(/^\?\/?([^/]*)\/?$/, '$1') || 'default',
            // When true (default), elements do NOT run their MQTT subscriptions in
            // the editor, so live broker values never get written onto elements and
            // saved into the view. Toggled via Editor settings; read live so it
            // applies to elements rendered after the setting changes.
            get preventEditorMqtt() {
                const v = localStorage.getItem('preventEditorMqtt');
                return v === null ? true : v === 'true';
            },
            get app() {
                return document.querySelector('feezal-app-editor');
            },
            get connection() {
                return document.querySelector('feezal-connection');
            },
            get menu() {
                return feezal.app.shadowRoot.querySelector('feezal-menu');
            },
            get palette() {
                return feezal.app.shadowRoot.querySelector('feezal-palette');
            },
            get site() {
                return feezal.app.querySelector('feezal-site');
            },
            get view() {
                return feezal.getView(feezal.site && feezal.site.view);
            },
            get views() {
                // The editor queries views during its first render, before the
                // site markup has been loaded — feezal.site is null then.
                return feezal.site ? feezal.site.querySelectorAll('feezal-view') : [];
            },
            get editor() {
                return feezal.app.shadowRoot.querySelector('feezal-sidebar-inspector');
            },
            get container() {
                return feezal.app.shadowRoot.querySelector('#container');
            },
            getView(name) {
                if (!feezal.site) return null;
                if (!name) return feezal.site.querySelector('feezal-view');
                return feezal.site.querySelector('feezal-view[name="' + name + '"]');
            }
        };

        window.addEventListener('beforeunload', function (e) {
            if (feezal.hasChanges) {
                const msg = 'Really close editor? There are unsaved changes!';
                (e || window.event).returnValue = msg;
                e.preventDefault();
                return msg;
            }
        });

    </script>

    <script type="module" src="../src/feezal-connection.js"></script>
    <script type="module">
        import { setBasePath } from '@shoelace-style/shoelace/dist/utilities/base-path.js';
        setBasePath('https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/dist');
    </script>
    <script type="module" src="../src/feezal-app-editor.js"></script>
    <script type="module" src="feezal-elements.js"></script>
</head>

<body>
    <feezal-connection editor></feezal-connection>
    <feezal-app-editor></feezal-app-editor>
</body>

</html>
